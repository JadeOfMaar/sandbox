// Allows for scaling the base stats in the shape switch
// of Heat Control's graphene panels.

// If the part is scaled uniformly, 
// set the values to the square of your rescale value.
// If the part is not scaled uniformly, 
// set the values to the product of length and width rescale.

@PART[radiator-microchannel-fixed-?]:AFTER[SystemHeat]
{
	@MODULE[ModuleSystemHeatRadiator]
	{
		@convectiveArea *= 1
		@RESOURCE
		{
			@rate *= 1
		}
		@temperatureCurve
		{
			@key,1[1, ] *= 1
		}
	}
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[sizeSwitch]]
	{
		@SUBTYPE,*
		{
			@addedMass *= 1
			@addedCost *= 1
			@MODULE
			{
				@DATA
				{
					@temperatureCurve
					{
						@key,1[1, ] *= 1
					}
					@RESOURCE
					{
						@rate *= 1
					}
				}
			}
		}
	}
}