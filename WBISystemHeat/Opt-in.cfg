// Engines opt-in

// Valid tag names are:
// - SHThREng   (for thermal nozzle rockets)
// - SHFisEng   (for generic solid core NTR)
// - SHFisEngGC (for gas core NTR)
// - SHIonEng   (for ion engines)
// - SHAmEng    (for beam core antimatter)

@PART[NuclearAerospike]
{
	SHFisEng = Yes
}
@PART[WB8Supernova|wbiHypernova]
{
	SHFusEng = Yes
}
@PART[AJ5ArcJetEngine]
{
	SHIonEng = Yes
}


// Radiators opt-in

// Valid values for SHType are:
// - Ammonia  (350 K; stock)
// - NaK      (650 K; general ISRU)
// - Tin      (1100 K; general fission)
// - Graphene (1300 K; fusion and upper fission. Coolant is actually a noble gas)
// - Exotic   (1600 K; antimatter. Radiator surface is either molten metal or plasma)

@PART[WBI_LargeRadiator]
{
	SHTC = Yes
	SHType = Graphene
	SHArea = 28.12
	SHVol = 0.563
}

@PART[WBI_SmallRadiator]
{
	SHTC = Yes
	SHType = Ammonia
	SHArea = 2.835
	SHVol = 0.0284
}

@PART[wbiStorageShield]
{
	SHTC = Yes
	SHType = NaK
	SHArea = 615.04
	SHVol = 798.645
}

@PART[wbiAvatarRadiator]
{
	SHTC = Yes
	SHType = Graphene
	SHArea = 77.25
	SHVol = 24.72
}
