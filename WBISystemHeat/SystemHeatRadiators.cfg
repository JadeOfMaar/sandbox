@PART:HAS[#SHTC[Yes],#SHType[Graphene],#SHArea]:NEEDS[SystemHeat]
{
	@SHTC = Joined
	@description ^= :$: <br><#cc6633>System Heat radiator family.</color>
	
	SHPower = 400 // kW per m^2
	@SHPower *= #$SHArea$
	
	MODULE
	{
		name = ModuleSystemHeat
		volume = #$/SHVol$
		@volume *= 0.04
		moduleID = default
		iconName = Icon_Radiator
		ignoreTemperature = true
	}
	@MODULE[ModuleActiveRadiator]
	{
		@name = ModuleSystemHeatRadiator
		moduleID = radiator
		// ModuleSystemHeat instance to link to
		systemHeatModuleID = default
		scalarModuleID = heat
		maxTempAnimation = 1400

		// option: use deterministic temperatures
		// Power radiated per temperature
		temperatureCurve
		{
			key = 0 0
			key = 0.2 0.0016
			key = 0.4 0.0256
			key = 0.6 0.1296
			key = 0.8 0.4096
			key = 1 1
			@key,*[0, ] *= 1300
			@key,*[1, ] *= #$/SHPower$
		}
		// area for convection
		convectiveArea = #$/SHArea$
		@overcoolFactor = 1
		!RESOURCE {}
	}
	!MODULE[ModuleAnimateHeat] {}
	MODULE
	{
		name = ModuleSystemHeatColorAnimator
		moduleID = heat
		useRate = false
		animRate = 1
		shaderProperty = _EmissiveColor
		toggleInEditor = false
		toggleInFlight = false
		redCurve
		{
			key = 0 1
			key = 1 1
		}
		greenCurve
		{
			key = 0 1
			key = 1 1
		}
		blueCurve
		{
			key = 0 1
			key = 1 1
		}
		alphaCurve
		{
			key = 0 0
			key = 1 1
		}
	}
}

