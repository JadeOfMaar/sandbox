// Changes reactors into samples of how things will work in Sterling Systems.
// Assumes their chambers are not for Inertial Confinement but Sheared Flow Z-Pinch
// as the latter makes more sense at non-huge sizes.
// v 0.1 - Does not implement ChargedPower

@PART[impp_coreMk2]:BEFORE[SterlingSystems]
{
	refVolume = 1876
	@refCapacity = 0.58
}
@PART[impp_coreS1]:BEFORE[SterlingSystems]
{
	refVolume = 204
	@refCapacity = 0.06
}
@PART[impp_coreS2]:BEFORE[SterlingSystems]
{
	refVolume = 2454
	@refCapacity = 0.76
}
@PART[impp_coreS3]:BEFORE[SterlingSystems]
{
	refVolume = 5524
	@refCapacity = 1.7
}

// ignore coreS1G as that's gravitic only
@PART[impp_coreS?|impp_coreMk2]:BEFORE[SterlingSystems]
{
	@description ^= :$: <br><#A58F60>Sterling Prototype Fusor.</color> // Dark Magenta
	
	!RESOURCE,* {}
	!INPUT_RESOURCE,* {}
	!OUTPUT_RESOURCE,* {}
	!MODULE[ModuleResourceConverter],* {}
	
	%MODULE[ModuleSystemHeat]
	{
		%volume = #$/refVolume$
		@volume *= 0.04
		%moduleID = reactor
		%iconName = Icon_Atom
	}
	in01D = 1.037E-02
	in01T = 1.037E-02
	out01EC = 2052
	out01ThP = 6004
	out01ThW = 3040
	
	in02D = 2.6E-06
	in02He = 1.04E-05
	out02EC = 6000
	out02ThP = 400
	out02ThW = 8000
	
	in03D = 3.078E-03
	out03T = 1.56E-03
	out03EC = 211.2
	out03ThP = 668.8
	out03ThW = 4400
	
	in05H = 1.976E-03
	in05B = 1.976E-03
	out05EC = 1520
	out05ThW = 400
	
	inBlkt = 1.8855
	outBlkt = 3.1299
	
	@in01D *= #$refCapacity$
	@in01T *= #$refCapacity$
	@out01EC *= #$refCapacity$
	@out01ThP *= #$refCapacity$
	@out01ThW *= #$refCapacity$
	
	@in02D *= #$refCapacity$
	@in02He *= #$refCapacity$
	@out02EC *= #$refCapacity$
	@out02ThP *= #$refCapacity$
	@out02ThW *= #$refCapacity$
	
	@in03D *= #$refCapacity$
	@out03EC *= #$refCapacity$
	@out03T *= #$refCapacity$
	@out03ThP *= #$refCapacity$
	@out03ThW *= #$refCapacity$
	
	@in05H *= #$refCapacity$
	@in05B *= #$refCapacity$
	@out05EC *= #$refCapacity$
	@out05ThW *= #$refCapacity$
	
	@inBlkt *= #$refCapacity$ 
	@outBlkt *= #$refCapacity$
	
	MODULE
	{
		name = ModuleSystemHeatConverter
		moduleID = ZPFusor
		ConverterName = ZP Fusor
		StartActionName = Start Fusion Reactor
		StopActionName = Stop Fusion Reactor
		ToggleActionName = Toggle Fusion Reactor
		systemHeatModuleID = reactor
		shutdownTemperature = 1625
		systemOutletTemperature = 1300
		systemPower = #$/out01ThW$
		systemEfficiency
		{
			key = 0 0
			key = 0.2 0.002
			key = 0.4 0.026
			key = 0.6 0.13
			key = 0.8 0.41
			key = 1 1 4.08 0
			key = 1.05 1 0 -4.6
			key = 1.25 0.3 -2 -2
			key = 1.6 0 0 0
			@key,*[0, ] *= 1300
		}
		INPUT_RESOURCE
		{
			ResourceName = LqdDeuterium
			Ratio = #$/in01D$
		}
		INPUT_RESOURCE
		{
			ResourceName = LqdTritium
			Ratio = #$/in01T$
		}
		OUTPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = #$/out01EC$
			DumpExcess = True
		}
		OUTPUT_RESOURCE
		{
			ResourceName = ThermalPower
			Ratio = #$/out01ThP$
		}
	}
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = fusionfuel
		switcherDescription = Fuel Mix
		switcherDescriptionPlural = Fuel Mixes
		switchInFlight = True
		SUBTYPE
		{
			name = DT
			title = D + T
			primaryColor = PowderBlue
			secondaryColor = BoringGreen
			descriptionSummary = The easiest mix to ignite requires the least preheating but requires steady access to some deadly and scarce Tritium.
			descriptionDetail = #<b>Priority</b>: <#FDD900>Thermal</color> <br><br><b>Consumes</b>: <br>- $/in01D$ LqdDeuterium/sec <br>- $/in01T$ LqdTritium/sec <br><br><b>Produces</b>: <br>- $/out01EC$ ElectricCharge/sec <br>- $/out01ThP$ ThermalPower/sec <br><br><b>System Heat</b>: <br>- <#FF7F00>$/out01ThW$ kW</color> at 1300 K
		}
		SUBTYPE
		{
			name = DHe
			title = D + 3He
			primaryColor = PowderBlue
			secondaryColor = CloudyBlue
			descriptionSummary = Deuterium + Helium-3 is the palatable option for Joe Kerman. There is only marginal neutron abundance here, but Helium-3 is scarce like Tritium. Consider hiding a breeder reactor somewhere far from Joe's view.
			descriptionDetail = #<b>Priority</b>: <#FDD900>Electric</color> <br><br><b>Consumes</b>: <br>- $/in02D$ LqdDeuterium/sec <br>- $/in02He$ LqdHe3/sec <br><br><b>Produces</b>: <br>- $/out02EC$ ElectricCharge/sec <br>- $/out02ThP$ ThermalPower/sec <br><br><b>System Heat</b>: <br>- <#FF7F00>$/out02ThW$ kW</color> at 1600 K
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleSystemHeatConverter
					moduleID = ZPFusor
				}
				DATA
				{
					shutdownTemperature = 2000
					systemOutletTemperature = 1600
					systemPower = #$/out02ThW$
					systemEfficiency
					{
						key = 0 0
						key = 0.2 0.002
						key = 0.4 0.026
						key = 0.6 0.13
						key = 0.8 0.41
						key = 1 1 4.08 0
						key = 1.05 1 0 -4.6
						key = 1.25 0.3 -2 -2
						key = 1.6 0 0 0
						@key,*[0, ] *= 1600
					}
					INPUT_RESOURCE
					{
						ResourceName = LqdDeuterium
						Ratio = #$/in02D$
					}
					INPUT_RESOURCE
					{
						ResourceName = LqdHe3
						Ratio = #$/in02He$
					}
					OUTPUT_RESOURCE
					{
						ResourceName = ElectricCharge
						Ratio = #$/out02EC$
					}
					OUTPUT_RESOURCE
					{
						ResourceName = ThermalPower
						Ratio = #$/out02ThP$
						DumpExcess = True
					}
				}
			}
		}
		SUBTYPE
		{
			name = DD
			title = D + D
			primaryColor = PowderBlue
			secondaryColor = PowderBlue
			descriptionSummary = Getting Deuterium to fuse with itself is fairly hard and is low yield for pure energy, but Deuterium is easy to get, and this process breeds deadly but useful Tritium.
			descriptionDetail = #<b>Priority</b>: <#FDD900>Breeder</color> <br><br><b>Consumes</b>: <br>- $/in03D$ LqdDeuterium/sec <br><br><b>Produces</b>: <br>- $/out03EC$ ElectricCharge/sec <br>- $/out03ThP$ ThermalPower/sec <br>- $/out03T$ LqdTritium/sec <br><br><b>System Heat</b>: <br>- <#FF7F00>$/out03ThW$ kW</color> at 1800 K
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleSystemHeatConverter
					moduleID = ZPFusor
				}
				DATA
				{
					shutdownTemperature = 2250
					systemOutletTemperature = 1800
					systemPower = #$/out03ThW$
					systemEfficiency
					{
						key = 0 0
						key = 0.2 0.003
						key = 0.4 0.026
						key = 0.6 0.13
						key = 0.8 0.41
						key = 1 1 4.08 0
						key = 1.05 1 0 -4.6
						key = 1.25 0.3 -2 -2
						key = 1.6 0 0 0
						@key,*[0, ] *= 1800
					}
					INPUT_RESOURCE
					{
						ResourceName = LqdDeuterium
						Ratio = #$/in03D$
					}
					OUTPUT_RESOURCE
					{
						ResourceName = ElectricCharge
						Ratio = #$/out03EC$
						DumpExcess = True
					}
					OUTPUT_RESOURCE
					{
						ResourceName = ThermalPower
						Ratio = #$/out03ThP$
						DumpExcess = True
					}
					OUTPUT_RESOURCE
					{
						ResourceName = LqdTritium
						Ratio = #$/out03T$
					}
				}
			}
		}
		SUBTYPE
		{
			name = DHeLi
			title = D + 3He + Li
			primaryColor = PowderBlue
			secondaryColor = BrownishRed
			descriptionSummary = Nobility in times past equated power to showering in gold. Nobles today equate power to showering in Lithium. And we do it literally.
			descriptionDetail = #<b>Priority</b>: <#FDD900>Breeder</color> <br><br><b>Consumes</b>: <br>- $/in02D$ LqdDeuterium/sec <br>- $/in02He$ LqdHe3/sec <br>- $/inBlkt$ Lithium/sec <br><br><b>Produces</b>: <br>- $/out02EC$ ElectricCharge/sec <br>- $/out02ThP$ ThermalPower/sec <br>- $/outBlkt$ LqdTritium/sec <br><br><b>System Heat</b>: <br>- <#FF7F00>$/out02ThW$ kW</color> at 1600 K
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleSystemHeatConverter
					moduleID = ZPFusor
				}
				DATA
				{
					shutdownTemperature = 2000
					systemOutletTemperature = 1600
					systemPower = #$/out02ThW$
					systemEfficiency
					{
						key = 0 0
						key = 0.2 0.002
						key = 0.4 0.026
						key = 0.6 0.13
						key = 0.8 0.41
						key = 1 1 4.08 0
						key = 1.05 1 0 -4.6
						key = 1.25 0.3 -2 -2
						key = 1.6 0 0 0
						@key,*[0, ] *= 1600
					}
					INPUT_RESOURCE
					{
						ResourceName = LqdDeuterium
						Ratio = #$/in02D$
					}
					INPUT_RESOURCE
					{
						ResourceName = LqdHe3
						Ratio = #$/in02He$
					}
					INPUT_RESOURCE
					{
						ResourceName = Lithium
						Ratio = #$/inBlkt$
					}
					OUTPUT_RESOURCE
					{
						ResourceName = ElectricCharge
						Ratio = #$/out02EC$
						DumpExcess = True
					}
					OUTPUT_RESOURCE
					{
						ResourceName = ThermalPower
						Ratio = #$/out02ThP$
						DumpExcess = True
					}
					OUTPUT_RESOURCE
					{
						ResourceName = LqdTritium
						Ratio = #$/outBlkt$
					}
				}
			}
		}
		SUBTYPE
		{
			name = pB
			title = p + B
			primaryColor = ResourceColorLqdHydrogen
			secondaryColor = Grey
			descriptionSummary = Smacking a rare Boron-11 atom with a single proton is a pinnacle of clean energy. Zero neutrons guaranteed but also low yield and we need to prime this thing like it was the biggest gas stove so we could slow cook the biggest slab of meat for a festival.
			descriptionDetail = #<b>Priority</b>: <#FDD900>Electric</color> <br><br><b>Consumes</b>: <br>- $/in05H$ LqdHydrogen/sec <br>- $/in05B$ Boron/sec <br><br><b>Produces</b>: <br>- $/out05EC$ ElectricCharge/sec <br><br><b>System Heat</b>: <br>- <#FF7F00>$/out05ThW$ kW</color> at 2000 K
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleSystemHeatConverter
					moduleID = ZPFusor
				}
				DATA
				{
					shutdownTemperature = 2500
					systemOutletTemperature = 2000
					systemPower = #$/out05ThW$
					systemEfficiency
					{
						key = 0 0
						key = 0.2 0.002
						key = 0.4 0.026
						key = 0.6 0.13
						key = 0.8 0.41
						key = 1 1 4.08 0
						key = 1.05 1 0 -4.6
						key = 1.25 0.3 -2 -2
						key = 1.6 0 0 0
						@key,*[0, ] *= 2000
					}
					INPUT_RESOURCE
					{
						ResourceName = LqdHydrogen
						Ratio = #$/in05H$
					}
					INPUT_RESOURCE
					{
						ResourceName = Boron
						Ratio = #$/in05B$
					}
					OUTPUT_RESOURCE
					{
						ResourceName = ElectricCharge
						Ratio = #$/out05EC$
					}
				}
			}
		}
	}
}

@PART[impp_coreS?|impp_coreMk2]:BEFORE[SterlingSystems]
{
	!in* = nope
	!out* = nope
}