@PART:HAS[@MODULE[RealBattery],#RBbaseVolume]:NEEDS[SystemHeat]:FOR[RealBattery]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = #$../RBbaseVolume$
		@volume *= 0.001
		moduleID = ModuleSystemHeatRealBattery
		iconName = Icon_Gears
	}
}
@PART:HAS[@MODULE[RealBattery],#refVolume,!MODULE[ModuleSystemHeat]]:NEEDS[SystemHeat]:FOR[RealBattery]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = #$/refVolume$
		@volume *= 0.04 // 6.12
		moduleID = ModuleSystemHeatRealBattery
		iconName = Icon_Gears
	}
}
