@PART:HAS[@MODULE[ModuleEngines*]:HAS[#EngineType[Nuclear]],~NukeMTBF]:NEEDS[!RationalResourcesNuclearFamily]
{
	NukeMTBF = Yes
	%nucFuelScale = #$mass$
	@nucFuelScale /= 1.8
	
	@nucFuelScale += 0.005
	@nucFuelScale *= 100
	@nucFuelScale = #$nucFuelScale[0,.]$ // regex truncate, unknown behavior but used in RO
	@nucFuelScale /= 100
	
	%MODULE[Emitter]:NEEDS[FeatureRadiation] // Kerbalism radioactivity
	{
		%radiation = 0.0000277775 // 0.1 rad/h
		@radiation *= #$/mass$
		@radiation /= 3 // stock NERVA ref mass
	}
	@MODULE[Reliability]:HAS[#type[ModuleEngines*]]:NEEDS[FeatureReliability] // Kerbalism part failure
	{
		@repair = Engineer@3
		@rated_operation_duration = 7200
		@rated_operation_duration *= #$/nucFuelScale$
		@rated_ignitions = 90
	}
}
